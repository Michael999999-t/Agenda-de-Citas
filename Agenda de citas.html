<!DOCTYPE html>
<html lang="en">
<head>
   
    <style>
        :root {
            --bg: #f5f5f5;
            --white: #ffffff;
            --black: #111;
            --gray: #888;
            --green: #2ecc71;
            --red: #e74c3c;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: var(--bg);
        }

        /* HOME */
        #home {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* BUTTONS */
        .btn {
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-green {
            background: var(--green);
            color: white;
        }

        .btn-red {
            background: var(--red);
            color: white;
        }

        /* APP */
        #app {
            display: none;
            height: 100vh;
        }

        .container {
            display: flex;
            height: 100%;
        }

        /* LEFT PANEL */
        .left {
            width: 30%;
            background: #eaeaea;
            padding: 20px;
        }

        /* RIGHT PANEL */
        .right {
            width: 70%;
            padding: 20px;
            background: white;
            overflow-y: auto;
        }

        /* WORKERS */
        .worker-card {
            background: white;
            padding: 10px;
            margin-top: 10px;
        }

        /* YEAR VIEW */
        .calendar {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 10px;
        }

        .month {
            background: #fafafa;
            padding: 10px;
            text-align: center;
            cursor: pointer;
        }

        /* MONTH GRID */
        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .day-box {
            background: #fafafa;
            border: 1px solid #ddd;
            min-height: 80px;
            padding: 5px;
            cursor: pointer;
        }

        .day-number {
            font-size: 0.8rem;
            color: #666;
        }

        /* DAY VIEW */
        .hour {
            border: 1px solid #ddd;
            height: 50px;
            position: relative;
        }

        /* TASK BLOCK */
        .task {
            position: absolute;
            left: 60px;
            right: 5px;
            background: var(--green);
            color: white;
            font-size: 0.75rem;
            padding: 4px;
            border-radius: 4px;
        }
    </style>
</head>

<body>

  

    <!-- APP -->
    <div id="app">
        <div class="container">

            <!-- LEFT -->
            <div class="left">
                <h3>Workers</h3>

                <input id="name" placeholder="Name"><br><br>
                <input id="job" placeholder="Job"><br><br>
                <input id="workerHours" placeholder="Hours"><br><br>

                <button class="btn btn-green" onclick="addWorker()">Add</button>

                <div id="workersList"></div>

                <hr>
                <button class="btn btn-green" onclick="exportJSON()">Export JSON</button>
            </div>

            <!-- RIGHT -->
            <div class="right">

                <div id="calendarView">
                    <h2>Year Overview</h2>
                    <div id="calendar" class="calendar"></div>
                </div>

                <div id="dayView" style="display:none;">
                    <button onclick="backToCalendar()">← Back</button>
                    <h2 id="selectedDate"></h2>
                    <div id="calendarContent"></div>
                </div>

            </div>

        </div>
    </div>

    <script>
        let workers = [];
        let schedules = {};
        let currentMonthIndex = 0;
        let currentYear = new Date().getFullYear();

        /* START */
        function startApp() {
            document.getElementById("home").style.display = "none";
            document.getElementById("app").style.display = "block";
        }

        /* WORKERS */
        function addWorker() {
            const name = document.getElementById("name").value;
            const job = document.getElementById("job").value;
            const hours = document.getElementById("workerHours").value;

            if (!name) return;

            workers.push({ name, job, hours });
            renderWorkers();
        }

        function deleteWorker(i) {
            workers.splice(i, 1);
            renderWorkers();
        }

        function renderWorkers() {
            const list = document.getElementById("workersList");
            list.innerHTML = "";

            workers.forEach((w, i) => {
                const div = document.createElement("div");
                div.className = "worker-card";
                div.innerHTML = `
          <strong>${w.name}</strong><br>
          ${w.job}<br>
          ${w.hours}<br>
          <button class="btn btn-red" onclick="deleteWorker(${i})">Delete</button>
        `;
                list.appendChild(div);
            });
        }

        /* CALENDAR */
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        function daysInMonth(month, year) {
            return new Date(year, month + 1, 0).getDate();
        }

        function generateCalendar() {
            const cal = document.getElementById("calendar");
            cal.innerHTML = "";

            months.forEach((m, i) => {
                const div = document.createElement("div");
                div.className = "month";
                div.innerText = m;
                div.onclick = () => openMonth(i);
                cal.appendChild(div);
            });
        }

        /* MONTH VIEW */
        function openMonth(monthIndex) {
            currentMonthIndex = monthIndex;

            document.getElementById("calendarView").style.display = "none";
            document.getElementById("dayView").style.display = "block";

            const container = document.getElementById("calendarContent");
            container.innerHTML = '<div class="calendar-days" id="daysGrid"></div>';

            const grid = document.getElementById("daysGrid");
            const totalDays = daysInMonth(monthIndex, currentYear);

            document.getElementById("selectedDate").innerText =
                months[monthIndex] + " " + currentYear;

            for (let d = 1; d <= totalDays; d++) {
                const div = document.createElement("div");
                div.className = "day-box";

                div.innerHTML = `<div class="day-number">${d}</div>`;
                div.onclick = () => openDay(d);

                grid.appendChild(div);
            }
        }

        /* DAY VIEW */
        function openDay(day) {
            const container = document.getElementById("calendarContent");
            container.innerHTML = "";

            const key = `${currentYear}-${currentMonthIndex}-${day}`;

            document.getElementById("selectedDate").innerText =
                `${months[currentMonthIndex]} ${day}, ${currentYear}`;

            for (let i = 0; i < 24; i++) {
                const row = document.createElement("div");
                row.className = "hour";
                row.innerText = i + ":00";

                row.onclick = () => assignWorker(key);

                container.appendChild(row);
            }

            if (schedules[key]) {
                schedules[key].forEach(task => {
                    const block = document.createElement("div");
                    block.className = "task";

                    block.style.top = (task.start * 50) + "px";
                    block.style.height = ((task.end - task.start) * 50) + "px";

                    block.innerText = `${task.worker}\n${task.desc}`;

                    container.appendChild(block);
                });
            }
        }

        /* ASSIGN */
        function assignWorker(dateKey) {
            if (workers.length === 0) {
                alert("Add workers first");
                return;
            }

            const worker = prompt("Worker name:");
            const start = parseInt(prompt("Start hour (0-23):"));
            const end = parseInt(prompt("End hour (1-24):"));
            const desc = prompt("Task description:");

            if (!worker || isNaN(start) || isNaN(end) || end <= start) {
                alert("Invalid input");
                return;
            }

            if (!schedules[dateKey]) schedules[dateKey] = [];

            schedules[dateKey].push({ worker, start, end, desc });

            openDay(parseInt(dateKey.split("-")[2]));
        }

        /* BACK */
        function backToCalendar() {
            document.getElementById("dayView").style.display = "none";
            document.getElementById("calendarView").style.display = "block";
        }

        /* EXPORT JSON */
        function exportJSON() {
            const dataStr = JSON.stringify(schedules, null, 2);

            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "monthly_schedule.json";
            a.click();
        }

        /* INIT */
        generateCalendar();
    </script>

</body>
</html>
